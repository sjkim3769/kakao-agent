name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kakao_agent
          POSTGRES_USER: kakao
          POSTGRES_PASSWORD: kakao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kakao -d kakao_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kakao:kakao@localhost:5432/kakao_agent
      REDIS_URL: redis://localhost:6379/0
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      JWT_SECRET_KEY: test-secret-key-for-ci-only

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply DB schema
        run: psql $DATABASE_URL -f src/db/schema.sql

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kakao-agent:${{ github.sha }} .
